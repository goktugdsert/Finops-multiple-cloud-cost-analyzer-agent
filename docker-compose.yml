# Local Postgres warehouse for dev + integration tests.
# Version pinned for reproducibility. Bring up with: docker compose up -d
# Credentials come from .env (see .env.example). Data persists in ./pgdata.
services:
  postgres:
    image: postgres:16.4
    container_name: mcca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcca}
      POSTGRES_DB: ${POSTGRES_DB:-mcca}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mcca} -d ${POSTGRES_DB:-mcca}"]
      interval: 5s
      timeout: 5s
      retries: 10
